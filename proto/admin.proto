syntax = "proto3";

package mx20022.runtime.admin.v1;
import "google/protobuf/empty.proto";

message HealthResponse {
  bool ok = 1;
}

message ReadyResponse {
  bool ready = 1;
  string details = 2;
}

message StatusResponse {
  string runtime = 1;
  repeated string pipelines = 2;
  repeated string channels = 3;
  string store = 4;
  string uptime_ms = 5;
  bool store_ok = 6;
  string store_details = 7;
  uint64 in_flight_count = 8;
  uint64 pending_correlation_count = 9;
  uint64 dead_letter_count = 10;
  string config_version = 11;
  string last_reload_result = 12;
  string last_reload_at = 13;
}

message GetTransactionRequest {
  string tx_id = 1;
}

message TransactionResponse {
  string tx_id = 1;
  string pipeline = 2;
  string message_type = 3;
  string state = 4;
  string received_at = 5;
  string completed_at = 6;
}

message ReloadResponse {
  bool reloaded = 1;
  string details = 2;
}

service AdminService {
  rpc GetHealth(google.protobuf.Empty) returns (HealthResponse);
  rpc GetReady(google.protobuf.Empty) returns (ReadyResponse);
  rpc GetStatus(google.protobuf.Empty) returns (StatusResponse);
  rpc GetTransaction(GetTransactionRequest) returns (TransactionResponse);
  rpc Reload(google.protobuf.Empty) returns (ReloadResponse);
}
