services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/k2payments:cached
    command: sleep infinity
    environment:
      RUST_LOG: info
    depends_on:
      - postgres
      - nats
      - rabbitmq
      - kafka
    networks:
      - k2net

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: k2
      POSTGRES_PASSWORD: k2
      POSTGRES_DB: k2payments
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - k2net

  nats:
    image: nats:2
    restart: unless-stopped
    ports:
      - "${NATS_HOST_PORT:-14222}:4222"
    networks:
      - k2net

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "${RABBITMQ_HOST_PORT:-15672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-25672}:15672"
    networks:
      - k2net

  kafka:
    image: apache/kafka:3.7.1
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT:-19092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Dev-friendly settings for a single-node cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - k2net
      
volumes:
  postgres-data:

networks:
  k2net:
    driver: bridge
