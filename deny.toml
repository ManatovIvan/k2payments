[advisories]
ignore = [
  { id = "RUSTSEC-2024-0384", reason = "Transitive via lapin; no safe upgrade available yet" },
  { id = "RUSTSEC-2025-0134", reason = "Transitive via async-nats/tonic stack; awaiting upstream migration" },
  { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102.x CRL matching bug; no 0.102.x patch exists upstream. async-nats 0.46 pins 0.102.8 directly. Fix is in 0.103.10+ but async-nats has not migrated. NATS channel does not perform CRL checking so practical risk is nil. Track: https://github.com/nats-io/nats.rs/issues" },
]

[licenses]
allow = ["AGPL-3.0-only", "Apache-2.0", "MIT", "BSD-3-Clause", "BSD-2-Clause", "ISC", "Unicode-3.0", "Unicode-DFS-2016", "OpenSSL", "Zlib", "CDLA-Permissive-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
