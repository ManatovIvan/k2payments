name: Cargo Audit

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      # Advisories below are also ignored in deny.toml (no safe upgrade yet).
      - run: >-
          cargo audit
          --ignore RUSTSEC-2024-0384
          --ignore RUSTSEC-2025-0134
